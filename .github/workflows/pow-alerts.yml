name: Turoa Pow Alerts

# Runs twice a day, free, on GitHub's servers. No computer of yours needs to be on.
on:
  schedule:
    - cron: '0 18 * * *'   # 06:00 NZST - dawn patrol (today) + go-time calls
    - cron: '0 7 * * *'    # 19:00 NZST - night-before (tomorrow) + watch flags
  workflow_dispatch: {}     # adds a manual "Run workflow" button for testing

permissions:
  contents: write           # lets the bot save state.json so it never double-pings you

concurrency:
  group: turoa-pow
  cancel-in-progress: false

jobs:
  check-pow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check the pow
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 turoa_pow_alerts.py

